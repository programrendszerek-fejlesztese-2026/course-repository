version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        UID: ${MY_UID:-1000}
        GID: ${MY_GID:-1000}
    volumes:
      - ./server:/app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=receptdb
      - MONGO_USER=admin
      - MONGO_PASS=secret
    depends_on:
      - mongo
    command: sh -c "npm install && npm start"

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: receptdb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./server/docker-init:/docker-entrypoint-initdb.d:ro

volumes:
  mongo-data:
